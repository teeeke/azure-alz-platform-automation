name: Deploy Bootstrap
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: dev
      principalGroups:
        description: 'Comma-separated list of Azure AD groups for RBAC'
        required: true
        default: 'PlatformAdmins,DevOpsTeam'
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Resolve group names to IDs
        id: resolve_groups
        run: |
          echo "Resolving principal group names..."
          groups="${{ github.event.inputs.principalGroups }}"
          IFS=',' read -r -a groupArray <<< "$groups"
          principalIds="[]"
          for group in "${groupArray[@]}"; do
            id=$(az ad group show --group "$group" --query id -o tsv || echo "")
            if [ -n "$id" ]; then
              principalIds=$(jq --arg id "$id" '. += [$id]' <<< "$principalIds")
            else
              echo "WARNING: Group '$group' not found."
            fi
          done
          echo "principalIds=$principalIds" >> $GITHUB_ENV

      - name: Prepare bootstrap parameters
        run: |
          jq --argjson ids "${{ env.principalIds }}" \
             '.parameters.principalIds.value = $ids' \
             parameters/bootstrap-${{ github.event.inputs.environment }}.json > parameters/bootstrap-temp.json
          echo "Prepared parameter file:"
          cat parameters/bootstrap-temp.json

      # 🔍 New validation step
      - name: Validate Bootstrap Bicep
        run: |
          az deployment tenant validate \
            --name "bootstrap-validate-${{ github.run_id }}" \
            --location eastus \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-temp.json

      - name: Deploy Bootstrap
        run: |
          az deployment tenant create \
            --name "bootstrap-${{ github.event.inputs.environment }}" \
            --location eastus \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-temp.json
