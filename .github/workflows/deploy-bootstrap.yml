name: Deploy Bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy (dev/test/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  deploy-bootstrap:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep upgrade

      - name: Deploy Bootstrap
        run: |
          az deployment tenant create \
            --name bootstrap-${{ github.run_id }} \
            --location eastus \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-${{ github.event.inputs.environment }}.json
