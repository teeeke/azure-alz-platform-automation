name: Deploy Bootstrap
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: dev
      principalGroups:
        description: 'Comma-separated list of Azure AD groups for RBAC'
        required: true
        default: 'PlatformAdmins,DevOpsTeam'
      location:
        description: 'Azure region for deployment'
        required: true
        default: 'eastus'
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Resolve group names to IDs
        id: resolve_groups
        run: |
          echo "Resolving principal group names..."
          groups="${{ github.event.inputs.principalGroups }}"
          IFS=',' read -r -a groupArray <<< "$groups"
          
          # Build JSON array directly
          principalIds=""
          first=true
          for group in "${groupArray[@]}"; do
            # Trim whitespace
            group=$(echo "$group" | xargs)
            echo "Resolving group: $group"
            id=$(az ad group show --group "$group" --query id -o tsv)
            echo "Found ID: $id"
            
            if [ "$first" = true ]; then
              principalIds="\"$id\""
              first=false
            else
              principalIds="$principalIds,\"$id\""
            fi
          done
          
          # Create final JSON array
          principalIds="[$principalIds]"
          echo "Final principalIds: $principalIds"
          
          # Save to file instead of environment variable
          echo "$principalIds" > /tmp/principal-ids.json
      - name: Prepare bootstrap parameters
        run: |
          echo "Reading principal IDs from file:"
          cat /tmp/principal-ids.json
          
          # Use the JSON file directly with jq
          principalIds=$(cat /tmp/principal-ids.json)
          jq --argjson ids "$principalIds" '.principalIds = $ids' parameters/bootstrap-${{ github.event.inputs.environment }}.json > parameters/bootstrap-temp.json
          
          echo "Generated bootstrap-temp.json:"
          cat parameters/bootstrap-temp.json
      - name: Deploy Bootstrap
        run: |
          az deployment tenant create \
            --name "bootstrap-${{ github.event.inputs.environment }}" \
            --location ${{ github.event.inputs.location }} \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-temp.json