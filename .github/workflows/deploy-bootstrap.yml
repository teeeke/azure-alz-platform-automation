name: Deploy Bootstrap
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: dev
      principalGroups:
        description: 'Comma-separated list of Azure AD groups for RBAC'
        required: true
        default: 'PlatformAdmins,DevOpsTeam'
      location:
        description: 'Azure region for deployment'
        required: true
        default: 'eastus'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: true
      
      - name: Set Azure CLI defaults and verify connection
        run: |
          # Clear any existing sessions
          az account clear
          
          # Login again to ensure fresh session
          echo "Re-authenticating to ensure fresh session..."
          az login --service-principal -u $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId) -p $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret) --tenant $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)
          
          # Set defaults and verify
          az configure --defaults location=${{ github.event.inputs.location }}
          az account show --output table
          
          # Test tenant access
          az account management-group list --query "[0].id" --output tsv || echo "No management groups found - this is expected for initial deployment"
      
      - name: Get current subscription
        id: get_subscription
        run: |
          echo "Getting current subscription ID..."
          subscriptionId=$(az account show --query id --output tsv)
          echo "Current subscription: $subscriptionId"
          echo "subscriptionId=$subscriptionId" >> $GITHUB_OUTPUT
          echo "subscriptionId=$subscriptionId" >> $GITHUB_ENV
      
      - name: Resolve group names to IDs
        id: resolve_groups
        run: |
          echo "Resolving principal group names..."
          groups="${{ github.event.inputs.principalGroups }}"
          IFS=',' read -r -a groupArray <<< "$groups"
          
          # Build JSON array directly
          principalIds=""
          first=true
          for group in "${groupArray[@]}"; do
            # Trim whitespace
            group=$(echo "$group" | xargs)
            echo "Resolving group: $group"
            id=$(az ad group show --group "$group" --query id --output tsv)
            echo "Found ID: $id for group: $group"
            
            if [ "$first" = true ]; then
              principalIds="\"$id\""
              first=false
            else
              principalIds="$principalIds,\"$id\""
            fi
          done
          
          # Create final JSON array
          principalIds="[$principalIds]"
          echo "Final principalIds: $principalIds"
          
          # Save to environment and output
          echo "principalIds=$principalIds" >> $GITHUB_OUTPUT
          echo "principalIds=$principalIds" >> $GITHUB_ENV
      
      - name: Prepare bootstrap parameters
        run: |
          # Create the complete parameter file from scratch
          cat > parameters/bootstrap-temp.json << 'EOF'
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "prefix": {
                "value": "alz"
              },
              "environment": {
                "value": "${{ github.event.inputs.environment }}"
              },
              "location": {
                "value": "${{ github.event.inputs.location }}"
              },
              "subscriptionId": {
                "value": "${{ env.subscriptionId }}"
              },
              "principalIds": {
                "value": ${{ env.principalIds }}
              },
              "rolesArray": {
                "value": [
                  {
                    "name": "Owner",
                    "id": "/subscriptions/${{ env.subscriptionId }}/providers/Microsoft.Authorization/roleDefinitions/8e3af657-a8ff-443c-a75c-2fe8c4bcb635"
                  },
                  {
                    "name": "Contributor", 
                    "id": "/subscriptions/${{ env.subscriptionId }}/providers/Microsoft.Authorization/roleDefinitions/b24988ac-6180-42a0-ab88-20f7382dd24c"
                  }
                ]
              },
              "tags": {
                "value": {
                  "Environment": "${{ github.event.inputs.environment }}",
                  "Owner": "tehuti.ekema@globaris.gov",
                  "CostCenter": "12345"
                }
              },
              "logRetentionDays": {
                "value": 30
              },
              "mgCustomNames": {
                "value": {}
              }
            }
          }
          EOF
          
          echo "Generated bootstrap-temp.json:"
          cat parameters/bootstrap-temp.json
      
      - name: Validate Bicep template
        run: |
          echo "=== Validating JSON syntax ==="
          jq empty parameters/bootstrap-temp.json
          
          echo "=== Testing Azure connection before validation ==="
          az account show --query "id" --output tsv
          
          echo "=== Validating Bicep template with minimal output ==="
          # Use a simpler validation approach
          az deployment tenant validate \
            --location ${{ github.event.inputs.location }} \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-temp.json \
            --query "properties.provisioningState" \
            --output tsv
          
          echo "Template validation completed"
      
      - name: Deploy Bootstrap
        run: |
          echo "=== Starting bootstrap deployment ==="
          deploymentName="bootstrap-${{ github.event.inputs.environment }}-$(date +%Y%m%d-%H%M%S)"
          
          # Deploy without verbose to avoid session issues
          az deployment tenant create \
            --name "$deploymentName" \
            --location ${{ github.event.inputs.location }} \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters @parameters/bootstrap-temp.json \
            --query "properties.provisioningState" \
            --output tsv
          
          echo "=== Deployment completed: $deploymentName ==="
          
          # Get deployment status
          az deployment tenant show \
            --name "$deploymentName" \
            --query "{name: name, state: properties.provisioningState, timestamp: properties.timestamp}" \
            --output table