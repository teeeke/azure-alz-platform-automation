name: Bootstrap Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev/test/prod)"
        required: true
        default: "dev"
      prefix:
        description: "Resource prefix"
        required: true
        default: "demo"
      location:
        description: "Azure region"
        required: true
        default: "eastus"
      logRetentionDays:
        description: "Log Analytics retention days"
        required: false
        default: "30"
      subscriptionId:
        description: "Subscription ID for logging RG"
        required: false
        default: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      tags:
        description: "Resource tags (JSON string)"
        required: false
        default: '{"Owner":"PlatformTeam"}'
      principalIds:
        description: "Principal IDs (JSON array)"
        required: false
        default: '[]'
      rolesArray:
        description: "Role Definition IDs (JSON array)"
        required: false
        default: '[]'
      enabledSolutions:
        description: "Monitoring solutions (JSON object)"
        required: false
        default: '{"securityInsights": true, "updateManagement": true, "changeTracking": true}'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy Bootstrap Bicep
        run: |
          az deployment tenant create \
            --name "bootstrap-${{ github.run_id }}" \
            --location ${{ github.event.inputs.location }} \
            --template-file src/bootstrap/bootstrap.bicep \
            --parameters \
              environment=${{ github.event.inputs.environment }} \
              prefix=${{ github.event.inputs.prefix }} \
              location=${{ github.event.inputs.location }} \
              logRetentionDays=${{ github.event.inputs.logRetentionDays }} \
              subscriptionId=${{ github.event.inputs.subscriptionId }} \
              tags="${{ github.event.inputs.tags }}" \
              principalIds="${{ github.event.inputs.principalIds }}" \
              rolesArray="${{ github.event.inputs.rolesArray }}" \
              enabledSolutions="${{ github.event.inputs.enabledSolutions }}"
