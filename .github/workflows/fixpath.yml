name: Validate Bicep References

on:
  push:
  pull_request:

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Validate & Auto-fix module references
        run: |
          # validate syntax
          for f in $(find . -name "*.bicep"); do
            echo "🔎 Checking $f"
            az bicep build --file "$f"
          done

          # auto-fix module paths (if needed)
          az bicep restore
